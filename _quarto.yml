project:
  type: website
  output-dir: docs

website:
  title: "Jon Minton — Academic Works"
  description: "Three academic works spanning Electronic Engineering, Critical Theory, and Sociology"
  site-url: https://jonminton.github.io/academic-works
  repo-url: https://github.com/JonMinton/academic-works
  repo-actions: [issue]

  navbar:
    background: "#1c3447"
    foreground: "#ffffff"
    left:
      - text: "Home"
        href: index.qmd
      - text: "BEng"
        href: beng/index.qmd
      - text: "MA"
        href: ma/index.qmd
      - text: "PhD"
        href: phd/index.qmd
    right:
      - icon: github
        href: https://github.com/JonMinton/academic-works
      - text: "jonminton.net"
        href: https://jonminton.net

  sidebar:
    - id: beng
      title: "BEng: Machine Vision"
      style: floating
      contents:
        - beng/index.qmd
        - section: "Thesis"
          contents:
            - beng/abstract.qmd
            - beng/introduction.qmd
            - beng/theory.qmd
            - beng/methods.qmd
            - beng/results.qmd
            - beng/conclusion.qmd
            - beng/appendix.qmd
        - section: "Code"
          contents:
            - beng/code-overview.qmd

    - id: ma
      title: "MA: Critical Theory"
      style: floating
      contents:
        - ma/index.qmd

    - id: phd
      title: "PhD: Work and its Other"
      style: floating
      contents:
        - phd/index.qmd
        - section: "Pre-revision (2008)"
          contents:
            - phd/pre-outline.qmd
            - phd/pre-ch1.qmd
            - phd/pre-ch2.qmd
            - phd/pre-ch3.qmd
            - phd/pre-ch4.qmd
        - section: "Final thesis (2009)"
          contents:
            - phd/final.qmd
            - phd/final-front.qmd
            - phd/final-ch01.qmd
            - phd/final-ch02.qmd
            - phd/final-ch03.qmd
            - phd/final-ch04.qmd
            - phd/final-ch05.qmd
            - phd/final-ch06.qmd
            - phd/final-ch07.qmd
            - phd/final-ch08.qmd
            - phd/final-ch09.qmd
            - phd/final-ch10.qmd
            - phd/final-ch11.qmd
            - phd/final-ch12.qmd
            - phd/final-back.qmd
        - section: "Early direction (2006)"
          contents:
            - phd/early-direction/index.qmd
            - phd/early-direction/preface.qmd
            - phd/early-direction/concepts.qmd
            - phd/early-direction/house-and-home.qmd
            - phd/early-direction/work-and-worklessness.qmd
            - phd/early-direction/heuristics-and-attitudes.qmd
            - phd/early-direction/chaos-and-complexity.qmd
            - phd/early-direction/statistical-theory.qmd
            - phd/early-direction/literature-review.qmd
            - phd/early-direction/bibliography.qmd

  page-footer:
    left: "Jon Minton, 2003-2009 (archived 2026)"
    right: "Built with [Quarto](https://quarto.org)"

bibliography: references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    highlight-style: github
